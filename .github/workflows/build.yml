name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf libtool pkg-config \
            libffi-dev libssl-dev \
            zlib1g-dev libbz2-dev \
            libncurses5-dev libncursesw5-dev \
            cmake libltdl-dev lld

      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==3.0.10

      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== exit code: $EXIT_CODE ==="
          find . -name "*.apk" -type f 2>/dev/null
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== ERRORS ==="
            grep -in "error\|failed\|exception\|traceback\|fatal" build.log | tail -40
            exit 1
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ytdownloader-apk
          path: bin/*.apk
          retention-days: 30
